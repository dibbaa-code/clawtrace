services:
  clawtrace:
    build: https://github.com/dibbaa-code/clawtrace.git
    network_mode: host
    environment:
      - CLAWDBOT_API_TOKEN=${CLAWDBOT_API_TOKEN}
      - CLAWDBOT_URL=${CLAWDBOT_URL}
    volumes:
      - ${WORKSPACE_HOST_PATH:-~/.openclaw/workspace}:/root/.openclaw/workspace
    restart: unless-stopped
